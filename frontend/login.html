<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cloud Recipe Finder</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">

    <div class="auth-card">
        <div class="auth-card-top">
            <h1>Cloud Recipe Finder</h1>
        </div>
        <div class="auth-card-body">
            <h2>Welcome Back</h2>
            <form id="loginForm">
                <div class="field-group">
                    <input type="text" id="username" placeholder="Email or Username" required>
                </div>
                <div class="field-group password-wrapper">
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="button" class="toggle-password" data-target="password">Show</button>
                </div>
                <button type="submit" class="btn btn-solid submit-btn">Login</button>
            </form>
            <div id="message" class="message error"></div>
            <div class="auth-footer">
                Don't have an account? <a href="register.html">Sign up</a><br><br>
                <a href="home.html" style="font-weight: 500;">&larr; Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        document.querySelectorAll('.toggle-password').forEach((button) => {
            button.addEventListener('click', () => {
                const targetInput = document.getElementById(button.dataset.target);
                const isPassword = targetInput.type === 'password';
                targetInput.type = isPassword ? 'text' : 'password';
                button.textContent = isPassword ? 'Hide' : 'Show';
            });
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const identifier = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const messageElement = document.getElementById('message');

            try {
                const response = await fetch('/api/login', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ identifier, password })
                });

                const data = await response.json();

                if (response.ok) {
                    window.location.href = 'home.html';
                } else {
                    messageElement.className = 'message error';
                    messageElement.innerText = data.error || 'Login failed.';
                }
            } catch (error) {
                messageElement.className = 'message error';
                messageElement.innerText = 'Network error. Is the backend running?';
            }
        });
    </script>
</body>
</html>
