<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cloud Recipe Finder</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">

    <div class="auth-card">
        <div class="auth-card-top">
            <h1>Cloud Recipe Finder</h1>
        </div>
        <div class="auth-card-body">
            <h2>Welcome Back</h2>
            <form id="loginForm">
                <div class="field-group">
                    <input type="text" id="username" placeholder="Email or Username" required>
                </div>
                <div class="field-group password-wrapper">
                    <input type="password" id="password" placeholder="Password" required>
                    <input type="text" id="mfaCode" placeholder="6-Digit Authenticator Code" required maxlength="6">
                    <button type="button" class="toggle-password" data-target="password">Show</button>
                </div>
                <button type="submit" class="btn btn-solid submit-btn">Login</button>
            </form>
            <div id="mfaSection" style="display:none; margin-top: 1rem;">
                <h3 style="margin:0 0 0.7rem; text-align:center;">Multi-Factor Authentication</h3>
                <p id="mfaHint" class="message"></p>
                <div id="mfaQrWrap" style="display:none; text-align:center; margin:0.7rem 0;">
                    <img id="mfaQrImage" alt="MFA QR Code" style="max-width: 220px; width: 100%; border: 1px solid #dbe7f7; border-radius: 8px; padding: 6px; background: #fff;">
                    <p id="mfaManualCode" class="message" style="font-size:0.8rem;"></p>
                </div>
                <div class="field-group">
                    <input type="text" id="mfaCode" placeholder="Enter 6-digit code" inputmode="numeric" autocomplete="one-time-code">
                </div>
                <button type="button" id="verifyMfaBtn" class="btn btn-solid submit-btn">Verify & Continue</button>
            </div>
            <div id="message" class="message error"></div>
            <div class="auth-footer">
                Don't have an account? <a href="register.html">Sign up</a><br><br>
                <a href="home.html" style="font-weight: 500;">&larr; Back to Home</a>
            </div>
        </div>
    </div>

    <script>
    // ✅ Keep password toggle
    document.querySelectorAll('.toggle-password').forEach((button) => {
        button.addEventListener('click', () => {
            const targetInput = document.getElementById(button.dataset.target);
            const isPassword = targetInput.type === 'password';
            targetInput.type = isPassword ? 'text' : 'password';
            button.textContent = isPassword ? 'Hide' : 'Show';
        });
    });

    const messageElement = document.getElementById('message');

    function showError(message) {
        messageElement.className = 'message error';
        messageElement.innerText = message;
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const identifier = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const mfaCode = document.getElementById('mfaCode').value.trim();

        // ✅ Validate all fields
        if (!identifier || !password || !mfaCode) {
            showError('Username/email, password, and MFA code are required.');
            return;
        }

        try {
            const response = await fetch('/api/login', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ identifier, password, mfaCode }) // ✅ FIXED
            });

            const data = await response.json();

            if (response.ok) {
                window.location.href = 'home.html';
            } else {
                showError(data.error || 'Login failed.');
            }

        } catch (error) {
            showError('Network error. Is the backend running?');
        }
    });
</script>
</body>
</html>
