<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Recipe Finder</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="app-shell">

    <div class="app-container">
        <header>
            <h1 class="logo">Cloud Recipe Finder</h1>
            <div class="nav-buttons">
                <a href="login.html" class="btn-outline">Login</a>
                <a href="register.html" class="btn-solid">Register</a>
            </div>
        </header>

        <main>
            <section class="hero">
                <h2>Find Delicious Recipes</h2>
                <p>with ingredients you already have</p>
            </section>
            <div class="search-card">
                <h3>Find Your Next Meal</h3>
                <p>Enter ingredients from your fridge to discover tasty options.</p>
                <input type="text" placeholder="e.g., chicken, rice, broccoli" disabled>
                <button class="btn btn-solid" disabled>Search Recipes</button>
                <p class="muted-note">*Search functionality coming in Milestone 3</p>
            </div>
            <section class="category-section">
                <h3>Browse by Category</h3>
                <div class="category-grid">
                    <article class="category-card">
                        <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&w=600&q=80" alt="Healthy salad bowl">
                        <h4>Healthy</h4>
                    </article>
                    <article class="category-card">
                        <img src="https://images.unsplash.com/photo-1551024601-bec78aea704b?auto=format&fit=crop&w=600&q=80" alt="Dessert cake slices">
                        <h4>Desserts</h4>
                    </article>
                    <article class="category-card">
                        <img src="https://images.unsplash.com/photo-1515003197210-e0cd71810b5f?auto=format&fit=crop&w=600&q=80" alt="Quick stir fry dish">
                        <h4>Quick & Easy</h4>
                    </article>
                    <article class="category-card">
                        <img src="https://images.unsplash.com/photo-1604909052743-94e838986d24?auto=format&fit=crop&w=600&q=80" alt="Dinner meal plates">
                        <h4>Dinner</h4>
                    </article>
                </div>
            </section>
        </main>
    </div>

</body>
</html>
