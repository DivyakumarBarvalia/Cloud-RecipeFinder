<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Cloud Recipe Finder</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">

    <div class="auth-card">
        <div class="auth-card-top">
            <h1>Cloud Recipe Finder</h1>
        </div>
        <div class="auth-card-body">
            <h2>Create Your Account</h2>
            <form id="registerForm">
                <div class="field-group">
                    <input type="text" id="username" placeholder="Username" required>
                </div>
                <div class="field-group">
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>
                <div class="field-group password-wrapper">
                    <input type="password" id="password" placeholder="Create Password" required>
                    <button type="button" class="toggle-password" data-target="password">Show</button>
                </div>
                <div class="field-group password-wrapper">
                    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                    <button type="button" class="toggle-password" data-target="confirmPassword">Show</button>
                </div>
                <button type="submit" class="btn btn-solid submit-btn">Sign Up</button>
            </form>
            <div id="message" class="message"></div>
            <div class="auth-footer">
                Already have an account? <a href="login.html">Login</a><br><br>
                <a href="home.html" style="font-weight: 500;">&larr; Back to Home</a>
            </div>
        </div>
    </div>

   <script>
    // ✅ Keep password toggle feature
    document.querySelectorAll('.toggle-password').forEach((button) => {
        button.addEventListener('click', () => {
            const targetInput = document.getElementById(button.dataset.target);
            const isPassword = targetInput.type === 'password';
            targetInput.type = isPassword ? 'text' : 'password';
            button.textContent = isPassword ? 'Hide' : 'Show';
        });
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const messageElement = document.getElementById('message');

        // ✅ Keep password confirmation check
        if (password !== confirmPassword) {
            messageElement.className = 'message error';
            messageElement.innerText = 'Passwords do not match.';
            return;
        }

        try {
            const response = await fetch('/api/register', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });

            const data = await response.json();

            if (response.ok) {
                // ✅ Hide form and show MFA setup
                document.getElementById('registerForm').style.display = 'none';

                messageElement.className = 'message success';
                messageElement.innerHTML = `
                    <h3>Registration Successful!</h3>
                    <p><strong>Step 1:</strong> Scan this QR code with Google Authenticator or Authy</p>
                    <img src="${data.qrCode}" alt="MFA QR Code"
                        style="width: 200px; height: 200px; border: 2px solid #ddd; border-radius: 10px;">
                    
                    <p style="margin-top: 15px;">
                        <strong>Step 2:</strong> Use the generated 6-digit code when logging in
                    </p>

                    <br>
                    <a href="login.html"
                        style="background: var(--primary); color: white; padding: 10px 20px;
                        text-decoration: none; border-radius: 5px; font-weight: bold; display: inline-block;">
                        Proceed to Login
                    </a>
                `;
            } else {
                messageElement.className = 'message error';
                messageElement.innerText = data.error || 'Registration failed.';
            }
        } catch (error) {
            messageElement.className = 'message error';
            messageElement.innerText = 'Network error. Is the backend running?';
        }
    });
    </script>
</body>
</html>
