<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloud Recipe Finder</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="home-page">

<header class="app-header">
    <div class="logo logo-brand">
        <span class="logo-icon">☁️</span>
        <span>Cloud Recipe Finder</span>
    </div>
    <nav>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
    </nav>
</header>

<main class="home-main">
    <section class="hero">
        <h1>Find Recipes Instantly</h1>
        <p>Search recipes using ingredients you already have</p>

        <div class="search-bar">
            <input type="text" placeholder="Enter ingredients (e.g. chicken, rice)">
            <button>Search</button>
        </div>
    </section>

    <section class="popular-section" aria-labelledby="popular-heading">
        <div class="section-head">
            <h2 id="popular-heading">Popular Recipes</h2>
            <a class="section-link" href="#">View More &gt;</a>
        </div>
        <div class="recipe-row">
            <article class="recipe-card">
                <div class="recipe-card-image">
                    <img src="https://images.unsplash.com/photo-1563379926898-05f4575a45d8?w=400&h=240&fit=crop" alt="Garlic chicken pasta">
                </div>
                <h3 class="recipe-card-title">Garlic Chicken Pasta</h3>
            </article>
            <article class="recipe-card">
                <div class="recipe-card-image">
                    <img src="https://images.unsplash.com/photo-1547592166-23ac45744acd?w=400&h=240&fit=crop" alt="Vegetable soup">
                </div>
                <h3 class="recipe-card-title">Hearty Vegetable Soup</h3>
            </article>
            <article class="recipe-card">
                <div class="recipe-card-image">
                    <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=400&h=240&fit=crop" alt="Fresh pizza">
                </div>
                <h3 class="recipe-card-title">Garden Fresh Pizza</h3>
            </article>
        </div>
        <div class="section-cta">
            <button type="button" class="btn-outline">View More</button>
        </div>
    </section>

    <section class="browse-section" aria-labelledby="browse-heading">
        <h2 id="browse-heading">Browse by Category</h2>
        <div class="category-grid">
            <a href="#" class="category-item">
                <span class="category-icon" aria-hidden="true">🍽️</span>
                <span class="category-label">Dinner</span>
            </a>
            <a href="#" class="category-item">
                <span class="category-icon" aria-hidden="true">🍰</span>
                <span class="category-label">Desserts</span>
            </a>
            <a href="#" class="category-item">
                <span class="category-icon" aria-hidden="true">🥗</span>
                <span class="category-label">Healthy</span>
            </a>
            <a href="#" class="category-item">
                <span class="category-icon" aria-hidden="true">⚡</span>
                <span class="category-label">Quick &amp; Easy</span>
            </a>
        </div>
    </section>
</main>

</body>
</html>
